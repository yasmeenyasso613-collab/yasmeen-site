<!DOCTYPE html>
<html>
<head>
    <title>Gentil Security</title>
    <style>
        body {
            background: linear-gradient(black, #0a0a0a);
            color: #00ffcc;
            font-family: Consolas, monospace;
            text-align: center;
        }

        h1 {
            color: orange;
            margin-top: 30px;
        }

        .box {
            background: #111;
            border: 1px solid #00ffcc;
            padding: 20px;
            margin: 20px auto;
            width: 60%;
            border-radius: 10px;
            box-shadow: 0 0 10px #00ffcc;
        }

        code {
            display: block;
            margin: 10px;
            color: #00ff00;
        }

        .blink {
            animation: blink 1s infinite;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }
    </style>
</head>

<body>

<h1>⚡ Gentil Security | Location Tracker</h1>

<div class="box">
    <h2>Installation (Seeker)</h2>
    <code>git clone seeker</code>
    <code>cd seeker</code>
    <code class="blink">install.sh</code>
</div>

<div class="box">
    <h2>Installation (Ngrok)</h2>
    <code>wget ngrok</code>
    <code>setup token</code>
</div>
<h1 style="color: red; text-shadow: 0 0 20px red;">⚡ Yasmeen Security</h1>

</body>
</html>
