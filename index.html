<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Terminal</title>

<style>
body {
  background-color: black;
  color: #00ff00;
  font-family: monospace;
  padding: 20px;
}

.terminal {
  max-width: 800px;
}

.line::before {
  content: "yasmeen@mac:~$ ";
  color: #00ffff;
}

.blink {
  display: inline-block;
  width: 10px;
  background: #00ff00;
  animation: blink 1s infinite;
}

@keyframes blink {
  50% { opacity: 0; }
}
</style>

</head>

<body>

<div class="terminal">

<div class="line">git clone https://github.com/project</div>
<div>Cloning into 'project'...</div>
<div>remote: Counting objects: 100% (50/50)</div>
<div>Receiving objects: 100% ✔</div>

<br>

<div class="line">cd project</div>
<div class="line">bash install.sh</div>

<br>

<div class="line">Done ✔</div>

<br>

<div class="line">_ <span class="blink"></span></div>

</div>

</body>
</html>
